<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EDGAR Dashboard</title>
  <style>
    :root {
      --bg: #f4f7f7;
      --card: #ffffff;
      --ink: #1f2a37;
      --muted: #5c6b7a;
      --brand: #0f766e;
      --line: #d7dee5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #d8f3e8, var(--bg) 45%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
      grid-template-columns: 360px 1fr;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.04);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    input, select, button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      background: #fff;
    }
    #companyPicker {
      width: 100%;
      min-height: 150px;
    }
    button {
      cursor: pointer;
      background: var(--brand);
      color: #fff;
      border: none;
    }
    button.secondary {
      background: #334155;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }
    .muted { color: var(--muted); font-size: 12px; }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e5f7f4;
      color: #0f766e;
      font-size: 12px;
      font-weight: 600;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    #status {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      max-height: 220px;
      overflow: auto;
      background: #0b1726;
      color: #c5e3ff;
      border-radius: 8px;
      padding: 8px;
    }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>EDGAR UI</h1>
      <p class="muted">No login needed for this dashboard. Admin panel still requires login.</p>

      <h2>Company Selection</h2>
      <div class="row">
        <input id="q" placeholder="Search ticker/name (AAPL, Apple)">
        <button class="secondary" id="searchBtn">Search</button>
      </div>
      <div class="row">
        <select id="selectionMode">
          <option value="multiple">multiple</option>
          <option value="single">single</option>
        </select>
      </div>
      <div class="row">
        <select id="companyPicker" multiple></select>
      </div>
      <div class="row">
        <button class="secondary" id="selectAllBtn">Select All</button>
        <button class="secondary" id="clearBtn">Clear</button>
      </div>
      <table id="companiesTbl">
        <thead>
          <tr><th></th><th>Ticker</th><th>Name</th></tr>
        </thead>
        <tbody></tbody>
      </table>

      <h2 style="margin-top:14px;">Fetch Options</h2>
      <div class="row">
        <select id="endpoint">
          <option value="facts">facts</option>
          <option value="filings">filings</option>
          <option value="company_concept">company_concept</option>
          <option value="full_text_search">full_text_search</option>
        </select>
        <input id="taxonomy" value="us-gaap" placeholder="taxonomy">
        <input id="tag" value="Assets" placeholder="tag">
      </div>
      <div class="row">
        <input id="query" placeholder="full-text query (optional)">
      </div>
      <div class="row">
        <label>From <input id="periodStart" type="date"></label>
        <label>To <input id="periodEnd" type="date"></label>
      </div>
      <div class="row">
        <select id="frequency">
          <option value="annual">annual</option>
          <option value="quarterly">quarterly</option>
          <option value="all">all</option>
        </select>
        <label><input id="useAiMapping" type="checkbox" checked> Use AI mapping</label>
        <label><input id="refreshMapping" type="checkbox"> Refresh mapping (writes)</label>
      </div>
      <div class="row">
        <button id="fetchSelectedBtn">Fetch Selected (Bulk)</button>
        <button class="secondary" id="fetchOneBtn">Fetch First Selected</button>
      </div>
      <div class="row">
        <label><input id="autoRefresh" type="checkbox"> Auto-refresh</label>
        <input id="refreshSec" type="number" min="5" value="20" style="width:90px;"> sec
      </div>
    </section>

    <section class="card">
      <h2>Results</h2>
      <div class="row" id="summaryRow"></div>
      <p class="muted mono" id="activeCompany">Active: none</p>
      <div id="status">Ready.</div>

      <h2 style="margin-top:12px;">Fundamentals Table (latest selected)</h2>
      <table id="fundTable">
        <thead></thead>
        <tbody></tbody>
      </table>

      <h2 style="margin-top:12px;">Saved Documents (latest selected)</h2>
      <table id="docsTbl">
        <thead><tr><th>ID</th><th>Kind</th><th>Success</th><th>Fetched At</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script>
    const API = "/api/edgar/drf";
    let companies = [];
    let refreshTimer = null;

    function setSummary(data) {
      const row = document.getElementById("summaryRow");
      if (!data) {
        row.innerHTML = "";
        return;
      }
      row.innerHTML = `
        <span class="pill">Requested: ${data.requested ?? "-"}</span>
        <span class="pill">Saved Docs: ${(data.saved_document_ids || []).length}</span>
        <span class="pill">Fundamentals: ${data.fundamentals_saved ?? "-"}</span>
      `;
    }

    function log(msg, obj = null) {
      const el = document.getElementById("status");
      const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.textContent = obj ? `${line}\n${JSON.stringify(obj, null, 2)}\n\n${el.textContent}` : `${line}\n${el.textContent}`;
    }

    function selectedRows() {
      const picker = document.getElementById("companyPicker");
      const selected = Array.from(picker.selectedOptions).map(opt => ({
        id: opt.dataset.id ? Number(opt.dataset.id) : null,
        ticker: opt.value
      }));
      if (selected.length) return selected;
      return Array.from(document.querySelectorAll(".pick:checked")).map(x => ({
        id: x.dataset.id ? Number(x.dataset.id) : null,
        ticker: x.dataset.ticker
      }));
    }

    function applySingleModeToChecks() {
      const mode = document.getElementById("selectionMode").value;
      if (mode !== "single") return;
      const checks = Array.from(document.querySelectorAll(".pick:checked"));
      if (checks.length <= 1) return;
      const keep = checks[checks.length - 1];
      checks.forEach(c => { if (c !== keep) c.checked = false; });
    }

    async function resolveCompanyId(ticker) {
      const res = await fetch(`${API}/companies/?q=${encodeURIComponent(ticker)}&page=1&page_size=20`);
      const data = await res.json();
      const exact = (data.results || []).find(c => (c.ticker || "").toUpperCase() === ticker.toUpperCase());
      return exact ? exact.id : null;
    }

    async function loadCompanies() {
      const q = document.getElementById("q").value.trim();
      const res = await fetch(`/api/edgar/companies/universe/?limit=500${q ? `&q=${encodeURIComponent(q)}` : ""}`);
      const data = await res.json();
      companies = data.results || [];
      const tbody = document.querySelector("#companiesTbl tbody");
      const picker = document.getElementById("companyPicker");
      tbody.innerHTML = "";
      picker.innerHTML = "";
      for (const c of companies) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input class="pick" type="checkbox" data-id="${c.company_id || ""}" data-ticker="${c.ticker}"></td>
          <td>${c.ticker}</td>
          <td>${c.name || ""}${c.persisted ? "" : " (new)"}</td>
        `;
        tr.querySelector(".pick").addEventListener("change", applySingleModeToChecks);
        tbody.appendChild(tr);

        const opt = document.createElement("option");
        opt.value = c.ticker;
        opt.dataset.id = c.company_id || "";
        opt.textContent = `${c.ticker} - ${c.name || ""}`;
        picker.appendChild(opt);
      }
      const mode = document.getElementById("selectionMode").value;
      if (picker.options.length) {
        if (mode === "single") {
          picker.selectedIndex = 0;
        } else {
          picker.options[0].selected = true;
        }
      }
      log(`Loaded ${companies.length} companies`);
    }

    function buildPayload(symbols) {
      const payload = {
        symbols,
        endpoint: document.getElementById("endpoint").value,
        taxonomy: document.getElementById("taxonomy").value,
        tag: document.getElementById("tag").value,
        query: document.getElementById("query").value,
        persist: true,
      };
      const s = document.getElementById("periodStart").value;
      const e = document.getElementById("periodEnd").value;
      if (s) payload.period_start = s;
      if (e) payload.period_end = e;
      return payload;
    }

    async function fetchSelected(bulk = true) {
      const picks = selectedRows();
      if (!picks.length) {
        log("No companies selected.");
        return;
      }
      const symbols = bulk ? picks.map(x => x.ticker) : [picks[0].ticker];
      const payload = buildPayload(symbols);
      const res = await fetch(`${API}/ingestion/fetch/`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      log(`${bulk ? "Bulk" : "Single"} fetch complete (${symbols.length} symbols)`, data);
      setSummary(data);

      const last = bulk ? picks[picks.length - 1] : picks[0];
      const maybeFromResponse = ((data.results || []).find(r => r.symbol === last.ticker) || {}).company_id;
      const resolvedId = maybeFromResponse || last.id || await resolveCompanyId(last.ticker);
      await refreshDetails(resolvedId, last.ticker);
      await loadCompanies();
    }

    async function refreshDetails(companyId, ticker) {
      if (!companyId) {
        log(`No persisted company id for ${ticker} yet. Fetch completed but no detail view available.`);
        return;
      }
      document.getElementById("activeCompany").textContent = `Active: ${ticker} (id=${companyId})`;
      const frequency = document.getElementById("frequency").value || "annual";
      const useAi = document.getElementById("useAiMapping").checked ? "1" : "0";
      const refreshMapping = document.getElementById("refreshMapping").checked ? "1" : "0";
      const s = document.getElementById("periodStart").value;
      const e = document.getElementById("periodEnd").value;
      const fUrl = `${API}/companies/${companyId}/fundamental-table/?frequency=${encodeURIComponent(frequency)}&use_ai=${useAi}&refresh_mapping=${refreshMapping}${s ? `&period_start=${s}` : ""}${e ? `&period_end=${e}` : ""}`;
      const fRes = await fetch(fUrl);
      const fData = await fRes.json();

      const table = document.getElementById("fundTable");
      const head = table.querySelector("thead");
      const body = table.querySelector("tbody");
      const metrics = fData.metrics || [];
      head.innerHTML = `<tr><th>Period End</th><th>Form</th><th>FY</th>${metrics.map(m => `<th>${m}</th>`).join("")}</tr>`;
      body.innerHTML = "";
      if (!(fData.rows || []).length) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="${3 + metrics.length}">No structured fundamentals found for current filters.</td>`;
        body.appendChild(tr);
      }
      for (const p of (fData.rows || [])) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${p.period_end || ""}</td><td>${p.form || ""}</td><td>${p.fiscal_year || ""}</td>${metrics.map(m => `<td>${p[m] ?? ""}</td>`).join("")}`;
        body.appendChild(tr);
      }

      const dRes = await fetch(`${API}/documents/?ticker=${encodeURIComponent(ticker)}`);
      const dData = await dRes.json();
      const dtBody = document.querySelector("#docsTbl tbody");
      dtBody.innerHTML = "";
      if (!(dData.results || []).length) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="4">No documents found.</td>`;
        dtBody.appendChild(tr);
      }
      for (const d of (dData.results || [])) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${d.id}</td><td>${d.kind}</td><td>${d.success}</td><td>${d.fetched_at}</td>`;
        dtBody.appendChild(tr);
      }
    }

    function setupAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      const enabled = document.getElementById("autoRefresh").checked;
      if (!enabled) return;
      const sec = Math.max(5, Number(document.getElementById("refreshSec").value || 20));
      refreshTimer = setInterval(async () => {
        const picks = selectedRows();
        if (!picks.length) return;
        const companyId = picks[0].id || await resolveCompanyId(picks[0].ticker);
        await refreshDetails(companyId, picks[0].ticker);
      }, sec * 1000);
      log(`Auto-refresh every ${sec}s enabled`);
    }

    document.getElementById("searchBtn").addEventListener("click", loadCompanies);
    document.getElementById("selectAllBtn").addEventListener("click", () => {
      const mode = document.getElementById("selectionMode").value;
      const picker = document.getElementById("companyPicker");
      if (mode === "single") {
        picker.selectedIndex = picker.options.length ? 0 : -1;
      } else {
        Array.from(picker.options).forEach(o => { o.selected = true; });
      }
      document.querySelectorAll(".pick").forEach(c => c.checked = (mode !== "single"));
      if (mode === "single") applySingleModeToChecks();
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      document.querySelectorAll(".pick").forEach(c => c.checked = false);
      Array.from(document.getElementById("companyPicker").options).forEach(o => { o.selected = false; });
    });
    document.getElementById("fetchSelectedBtn").addEventListener("click", () => fetchSelected(true));
    document.getElementById("fetchOneBtn").addEventListener("click", () => fetchSelected(false));
    document.getElementById("autoRefresh").addEventListener("change", setupAutoRefresh);
    document.getElementById("refreshSec").addEventListener("change", setupAutoRefresh);
    document.getElementById("selectionMode").addEventListener("change", () => {
      const mode = document.getElementById("selectionMode").value;
      const picker = document.getElementById("companyPicker");
      picker.multiple = (mode === "multiple");
      if (mode === "single") {
        const selected = Array.from(picker.selectedOptions);
        if (selected.length > 1) {
          Array.from(picker.options).forEach(o => { o.selected = false; });
          selected[0].selected = true;
        }
        applySingleModeToChecks();
      }
    });
    document.getElementById("companyPicker").addEventListener("change", () => {
      const mode = document.getElementById("selectionMode").value;
      if (mode !== "single") return;
      const picker = document.getElementById("companyPicker");
      const selected = Array.from(picker.selectedOptions);
      if (selected.length > 1) {
        Array.from(picker.options).forEach(o => { o.selected = false; });
        selected[selected.length - 1].selected = true;
      }
    });

    loadCompanies();
  </script>
</body>
</html>
